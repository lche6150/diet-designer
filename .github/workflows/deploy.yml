name: Deploy to AWS

on:
  push:
    branches: [main]

# Only run one deployment at a time; cancel older runs if a new push arrives.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION:   ${{ secrets.AWS_REGION }}
  PROJECT_NAME: diet-designer
  ENVIRONMENT:  prod

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Build + push API image
  # ──────────────────────────────────────────────────────────────────────────
  build-api:
    name: Build & Push API
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push API image
        id: build
        env:
          REGISTRY:   ${{ steps.ecr-login.outputs.registry }}
          REPOSITORY: ${{ env.PROJECT_NAME }}/api
          IMAGE_TAG:  ${{ github.sha }}
        run: |
          IMAGE_URI="$REGISTRY/$REPOSITORY:$IMAGE_TAG"

          docker build \
            -f apps/api/Dockerfile \
            -t "$IMAGE_URI" \
            -t "$REGISTRY/$REPOSITORY:latest" \
            .

          docker push "$IMAGE_URI"
          docker push "$REGISTRY/$REPOSITORY:latest"

          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Build + push Web image
  # ──────────────────────────────────────────────────────────────────────────
  build-web:
    name: Build & Push Web
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Read API base URL from SSM
        id: ssm
        run: |
          API_URL=$(aws ssm get-parameter \
            --name "/${{ env.PROJECT_NAME }}/${{ env.ENVIRONMENT }}/API_BASE_URL" \
            --query "Parameter.Value" \
            --output text)
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"

      - name: Build, tag, and push Web image
        id: build
        env:
          REGISTRY:            ${{ steps.ecr-login.outputs.registry }}
          REPOSITORY:          ${{ env.PROJECT_NAME }}/web
          IMAGE_TAG:           ${{ github.sha }}
          NEXT_PUBLIC_API_URL: ${{ steps.ssm.outputs.api_url }}
        run: |
          IMAGE_URI="$REGISTRY/$REPOSITORY:$IMAGE_TAG"

          docker build \
            -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_API_BASE_URL="$NEXT_PUBLIC_API_URL" \
            -t "$IMAGE_URI" \
            -t "$REGISTRY/$REPOSITORY:latest" \
            .

          docker push "$IMAGE_URI"
          docker push "$REGISTRY/$REPOSITORY:latest"

          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Deploy API to ECS (pure AWS CLI — no marketplace actions)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API to ECS
    runs-on: ubuntu-latest
    needs: build-api

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Deploy new image to ECS
        env:
          IMAGE:   ${{ needs.build-api.outputs.image }}
          CLUSTER: ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-cluster
          SERVICE: ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-api
          FAMILY:  ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-api
        run: |
          # Fetch current task definition and strip read-only fields
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "$FAMILY" \
            --query taskDefinition \
            --output json | \
            jq 'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)')

          # Swap in the new image
          NEW_TASK_DEF=$(echo "$TASK_DEF" | \
            jq --arg IMAGE "$IMAGE" \
            '(.containerDefinitions[] | select(.name=="api") | .image) |= $IMAGE')

          # Register the updated task definition
          NEW_ARN=$(echo "$NEW_TASK_DEF" | \
            aws ecs register-task-definition \
              --cli-input-json file:///dev/stdin \
              --query taskDefinition.taskDefinitionArn \
              --output text)

          # Update the service and wait for stability
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --task-definition "$NEW_ARN"

          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$SERVICE"

  # ──────────────────────────────────────────────────────────────────────────
  # 4. Deploy Web to ECS (pure AWS CLI — no marketplace actions)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-web:
    name: Deploy Web to ECS
    runs-on: ubuntu-latest
    needs: build-web

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Deploy new image to ECS
        env:
          IMAGE:   ${{ needs.build-web.outputs.image }}
          CLUSTER: ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-cluster
          SERVICE: ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-web
          FAMILY:  ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-web
        run: |
          # Fetch current task definition and strip read-only fields
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "$FAMILY" \
            --query taskDefinition \
            --output json | \
            jq 'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)')

          # Swap in the new image
          NEW_TASK_DEF=$(echo "$TASK_DEF" | \
            jq --arg IMAGE "$IMAGE" \
            '(.containerDefinitions[] | select(.name=="web") | .image) |= $IMAGE')

          # Register the updated task definition
          NEW_ARN=$(echo "$NEW_TASK_DEF" | \
            aws ecs register-task-definition \
              --cli-input-json file:///dev/stdin \
              --query taskDefinition.taskDefinitionArn \
              --output text)

          # Update the service and wait for stability
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --task-definition "$NEW_ARN"

          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$SERVICE"
