name: Deploy to AWS

on:
  workflow_dispatch:

# Only run one deployment at a time; cancel older runs if a new push arrives.
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

env:
  AWS_REGION:   ${{ secrets.AWS_REGION }}
  PROJECT_NAME: diet-designer
  ENVIRONMENT:  prod
  DEPLOY_SHA:   ${{ github.sha }}

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Build + push API image
  # ──────────────────────────────────────────────────────────────────────────
  build-api:
    name: Build & Push API
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push API image
        id: build
        env:
          REGISTRY:   ${{ steps.ecr-login.outputs.registry }}
          REPOSITORY: ${{ env.PROJECT_NAME }}/api
          IMAGE_TAG:  ${{ env.DEPLOY_SHA }}
        run: |
          IMAGE_URI="$REGISTRY/$REPOSITORY:$IMAGE_TAG"

          docker build \
            -f apps/api/Dockerfile \
            -t "$IMAGE_URI" \
            -t "$REGISTRY/$REPOSITORY:latest" \
            .

          docker push "$IMAGE_URI"
          docker push "$REGISTRY/$REPOSITORY:latest"

          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Build + push Web image
  # ──────────────────────────────────────────────────────────────────────────
  build-web:
    name: Build & Push Web
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Read web build configuration from SSM
        id: ssm
        run: |
          API_URL=$(aws ssm get-parameter \
            --name "/${{ env.PROJECT_NAME }}/${{ env.ENVIRONMENT }}/API_BASE_URL" \
            --query "Parameter.Value" \
            --output text)
          GOOGLE_CLIENT_ID=$(aws ssm get-parameter \
            --name "/${{ env.PROJECT_NAME }}/${{ env.ENVIRONMENT }}/GOOGLE_CLIENT_ID" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text)
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "google_client_id=$GOOGLE_CLIENT_ID" >> "$GITHUB_OUTPUT"

      - name: Build, tag, and push Web image
        id: build
        env:
          REGISTRY:                      ${{ steps.ecr-login.outputs.registry }}
          REPOSITORY:                    ${{ env.PROJECT_NAME }}/web
          IMAGE_TAG:                     ${{ env.DEPLOY_SHA }}
          NEXT_PUBLIC_API_URL:           ${{ steps.ssm.outputs.api_url }}
          NEXT_PUBLIC_GOOGLE_CLIENT_ID:  ${{ steps.ssm.outputs.google_client_id }}
        run: |
          IMAGE_URI="$REGISTRY/$REPOSITORY:$IMAGE_TAG"

          docker build \
            -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_API_BASE_URL="$NEXT_PUBLIC_API_URL" \
            --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID="$NEXT_PUBLIC_GOOGLE_CLIENT_ID" \
            -t "$IMAGE_URI" \
            -t "$REGISTRY/$REPOSITORY:latest" \
            .

          docker push "$IMAGE_URI"
          docker push "$REGISTRY/$REPOSITORY:latest"

          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Deploy API to ECS (pure AWS CLI — no marketplace actions)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API to ECS
    runs-on: ubuntu-latest
    needs: build-api

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Deploy new image to ECS
        env:
          CLUSTER: ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-cluster
          SERVICE: ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-api
          FAMILY:  ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-api
        run: |
          # Build the image URI directly — avoids relying on inter-job output
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE="$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.PROJECT_NAME }}/api:${{ env.DEPLOY_SHA }}"
          echo "Deploying image: $IMAGE"

          # Fetch and clean the current task definition
          aws ecs describe-task-definition \
            --task-definition "$FAMILY" \
            --query taskDefinition \
            --output json > current.json

          jq 'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)' \
            current.json > cleaned.json

          echo "Container names in task def:"
          jq -r '.containerDefinitions[].name' cleaned.json

          # Swap in the new image
          jq --arg IMAGE "$IMAGE" \
            '.containerDefinitions = (.containerDefinitions | map(if .name == "api" then .image = $IMAGE else . end))' \
            cleaned.json > new-task-def.json

          echo "Image set in new task def:"
          jq -r '.containerDefinitions[].image' new-task-def.json

          # Register the updated task definition
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json \
            --query taskDefinition.taskDefinitionArn \
            --output text)

          echo "New task def ARN: $NEW_ARN"

          # Update the service and wait for stability
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --task-definition "$NEW_ARN"

          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$SERVICE"

  # ──────────────────────────────────────────────────────────────────────────
  # 4. Deploy Web to ECS (pure AWS CLI — no marketplace actions)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-web:
    name: Deploy Web to ECS
    runs-on: ubuntu-latest
    needs: build-web

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Deploy new image to ECS
        env:
          CLUSTER: ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-cluster
          SERVICE: ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-web
          FAMILY:  ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-web
        run: |
          # Build the image URI directly — avoids relying on inter-job output
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE="$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.PROJECT_NAME }}/web:${{ env.DEPLOY_SHA }}"
          echo "Deploying image: $IMAGE"

          # Fetch and clean the current task definition
          aws ecs describe-task-definition \
            --task-definition "$FAMILY" \
            --query taskDefinition \
            --output json > current.json

          jq 'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)' \
            current.json > cleaned.json

          echo "Container names in task def:"
          jq -r '.containerDefinitions[].name' cleaned.json

          # Swap in the new image
          jq --arg IMAGE "$IMAGE" \
            '.containerDefinitions = (.containerDefinitions | map(if .name == "web" then .image = $IMAGE else . end))' \
            cleaned.json > new-task-def.json

          echo "Image set in new task def:"
          jq -r '.containerDefinitions[].image' new-task-def.json

          # Register the updated task definition
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json \
            --query taskDefinition.taskDefinitionArn \
            --output text)

          echo "New task def ARN: $NEW_ARN"

          # Update the service and wait for stability
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --task-definition "$NEW_ARN"

          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$SERVICE"
