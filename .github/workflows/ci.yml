name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        # Delete node_modules and reinstall fresh so platform-specific native
        # binaries (lightningcss, SWC, Tailwind Oxide) match the Linux runner.
        run: |
          rm -rf node_modules apps/web/node_modules apps/api/node_modules
          npm install

      - name: Build Backend
        run: npm run build --workspace apps/api

      - name: Build Frontend
        run: npm run build --workspace apps/web
