name: CI

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform format check
        run: terraform -chdir=infra/terraform fmt -check

      - name: Terraform validate
        run: |
          terraform -chdir=infra/terraform init -backend=false
          terraform -chdir=infra/terraform validate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        # Delete node_modules and reinstall fresh so platform-specific native
        # binaries (lightningcss, SWC, Tailwind Oxide) match the Linux runner.
        # The committed lockfile was generated on macOS and does not include the
        # Linux lightningcss package entry that Next/Tailwind need in CI.
        run: |
          rm -rf package-lock.json node_modules apps/web/node_modules apps/api/node_modules
          npm install

      - name: Generate Prisma client
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/diet_designer?schema=public"
        run: npx prisma generate --schema=prisma/prisma/schema.prisma

      - name: Build Backend
        run: npm run build --workspace apps/api

      - name: Lint Frontend
        run: npm run lint --workspace apps/web

      - name: Build Frontend
        run: npm run build --workspace apps/web
